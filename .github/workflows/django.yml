name: Django DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # =====================================================================
  # 1️⃣ PRE-BUILD STAGE (Sonar, Java, Dependencies)
  # =====================================================================
  prebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OS Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip wget

      - name: Install Java 17 (Amazon Corretto)
        run: |
          sudo apt-get purge -y openjdk*
          sudo apt-get install -y java-common
          wget https://corretto.aws/downloads/latest/amazon-corretto-17-x64-linux-jdk.deb
          sudo dpkg -i amazon-corretto-17-x64-linux-jdk.deb
          export PATH=$JAVA_HOME/bin:$PATH
          echo "$java -version"
          echo "Java version: $(java --version)"
          echo "Java installation done"

  # =====================================================================
  # 2️⃣ BUILD + TEST STAGE (Sonar Scan, Pylint, Django Tests)
  # =====================================================================
  build_and_test:
    runs-on: ubuntu-latest
    needs: prebuild

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint coverage

      # -------------------------
      # Pylint full project linting
      # -------------------------
      - name: Run Pylint
        continue-on-error: true
        run: |
          pylint main --ignore=migrations || true

      # -------------------------
      # Django Unit Tests
      # -------------------------
      # - name: Run Django Tests
      #   run: |
      #     python manage.py test
      
      - name: Run tests with coverage
        run: |
          coverage run --source='.' manage.py test  # Add --source flag
          coverage xml -i  # -i ignores errors

      # -------------------------
      # Sonar Cloud Scan
      # -------------------------

      - name: Install Sonar Scanner
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner-cli-5.0.1.3006-linux.zip
          mv sonar-scanner-5.0.1.3006-linux sonar-scanner
          echo "${{ github.workspace }}/sonar-scanner/bin" >> $GITHUB_PATH

      - name: Version
        run: |
          sonar-scanner --version

      - name: Run Sonar Cloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
        run: |
          sonar-scanner \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            -Dsonar.organization=$SONAR_ORG \
            -Dsonar.sources=. \
            -Dsonar.python.coverage.reportPaths=coverage.xml \
            -Dsonar.exclusions=.c9/**,**/migrations/**,**/__pycache__/**,**/tests.py \
            -Dsonar.coverage.exclusions=**/*
      
          sleep 5
          curl "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY" > sonar_result.json
          cat sonar_result.json
          
      
      # Add this after your SonarCloud scan, still inside build_and_test job
      - name: Create deployment package
        run: |
          # Create a clean zip file for deployment
          zip -r deploy.zip . \
            -x "*.git*" \
            -x "*__pycache__*" \
            -x "*.pyc" \
            -x ".c9/*" \
            -x "coverage.xml" \
            -x ".coverage" \
            -x "sonar-scanner*" \
            -x "*.zip" \
            -x ".pytest_cache/*" \
            -x ".github/*"
      
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.zip
          retention-days: 5
          
  # # =====================================================================
  # # 3️⃣ DEPLOYMENT STAGE (AWS Elastic Beanstalk)
  # # =====================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          application_name: X24262404-eb
          environment_name: X24262404-eb-env
          region: us-east-1
          version_label: "build-${{ github.run_number }}"
          deployment_package: deploy.zip
          wait_for_deployment: false
          
