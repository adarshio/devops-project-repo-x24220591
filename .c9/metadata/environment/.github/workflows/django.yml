{"changed":true,"filter":false,"title":"django.yml","tooltip":"/.github/workflows/django.yml","value":"name: Django DevOps CI/CD Pipeline\n\non:\n  push:\n    branches:\n      - main\n\njobs:\n\n  prebuild_stage:\n    runs-on: ubuntu-latest\n\n    steps:\n      - name: Checkout repo\n        uses: actions/checkout@v3\n\n      - name: Set up Python\n        uses: actions/setup-python@v4\n        with:\n          python-version: \"3.11\"\n\n      - name: Install Python Dependencies\n        run: |\n          python -m pip install --upgrade pip\n          pip install -r requirements.txt\n\n      - name: Install OS Dependencies\n        run: |\n          sudo apt-get update\n          sudo apt-get install -y jq unzip wget\n\n      - name: Install Java 17\n        run: |\n          wget https://corretto.aws/downloads/latest/amazon-corretto-17-x64-linux-jdk.deb\n          sudo dpkg -i amazon-corretto-17-x64-linux-jdk.deb\n          java -version\n\n\n  pylint_stage:\n    runs-on: ubuntu-latest\n    needs: prebuild_stage\n\n    steps:\n      - name: Checkout repo\n        uses: actions/checkout@v3\n\n      - name: Set up Python\n        uses: actions/setup-python@v4\n        with:\n          python-version: \"3.11\"\n\n      - name: Install Dependencies\n        run: |\n          pip install --upgrade pip\n          pip install -r requirements.txt\n          pip install pylint coverage\n\n      - name: Run Pylint\n        continue-on-error: true\n        run: |\n          pylint $(git ls-files '*.py' | grep -Ev 'migrations|\\.c9') || true\n\n      - name: Run Django Tests\n        run: |\n          coverage run --source='.' manage.py test\n          coverage xml -i\n\n      - name: Upload Coverage Report\n        uses: actions/upload-artifact@v4\n        with:\n          name: coverage-report\n          path: coverage.xml\n\n\n  sonar_stage:\n    runs-on: ubuntu-latest\n    needs: pylint_stage\n\n    steps:\n      - name: Checkout repo\n        uses: actions/checkout@v3\n\n      - name: Download Coverage Report\n        uses: actions/download-artifact@v4\n        with:\n          name: coverage-report\n\n      - name: Install Sonar Scanner\n        run: |\n          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip\n          unzip sonar-scanner-cli-5.0.1.3006-linux.zip\n          mv sonar-scanner-5.0.1.3006-linux sonar-scanner\n          echo \"${{ github.workspace }}/sonar-scanner/bin\" >> $GITHUB_PATH\n\n      - name: Run SonarCloud Scan\n        env:\n          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}\n          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}\n          SONAR_ORG: ${{ secrets.SONAR_ORG }}\n        run: |\n          sonar-scanner \\\n            -Dsonar.login=$SONAR_TOKEN \\\n            -Dsonar.host.url=https://sonarcloud.io \\\n            -Dsonar.projectKey=$SONAR_PROJECT_KEY \\\n            -Dsonar.organization=$SONAR_ORG \\\n            -Dsonar.sources=. \\\n            -Dsonar.python.coverage.reportPaths=coverage.xml \\\n            -Dsonar.exclusions=.c9/**,**/migrations/**,**/__pycache__/**,**/tests.py\n\n      - name: Create Deployment Package\n        run: |\n          zip -r deploy.zip . \\\n            -x \"*.git*\" \\\n            -x \"*__pycache__*\" \\\n            -x \"*.pyc\" \\\n            -x \".c9/*\" \\\n            -x \"coverage.xml\" \\\n            -x \".coverage\" \\\n            -x \"sonar-scanner*\" \\\n            -x \"*.zip\" \\\n            -x \".pytest_cache/*\" \\\n            -x \".github/*\"\n\n      - name: Upload Deployment Artifact\n        uses: actions/upload-artifact@v4\n        with:\n          name: deploy-package\n          path: deploy.zip\n          retention-days: 5\n\n\n  deploy_stage:\n    runs-on: ubuntu-latest\n    needs: sonar_stage\n\n    steps:\n      - name: Download Deployment Package\n        uses: actions/download-artifact@v4\n        with:\n          name: deploy-package\n\n      - name: Configure AWS Credentials\n        uses: aws-actions/configure-aws-credentials@v2\n        with:\n          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}\n          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}\n          aws-region: us-east-1\n\n      - name: Deploy to Elastic Beanstalk\n        uses: einaregilsson/beanstalk-deploy@v21\n        with:\n          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}\n          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}\n          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}\n          application_name: Elastic-beanstalk-x24220591\n          environment_name: Elastic-beanstalk-x24220591-env\n          region: us-east-1\n          version_label: \"build-${{ github.run_number }}\"\n          deployment_package: deploy.zip\n          wait_for_deployment: false","undoManager":{"mark":45,"position":45,"stack":[[{"start":{"row":8,"column":0},"end":{"row":10,"column":73},"action":"remove","lines":["  # =====================================================================","  # 1️⃣ PRE-BUILD STAGE (Sonar, Java, Dependencies)","  # ====================================================================="],"id":153}],[{"start":{"row":41,"column":0},"end":{"row":44,"column":73},"action":"remove","lines":["","  # =====================================================================","  # 2️⃣ BUILD + TEST STAGE (Sonar Scan, Pylint, Django Tests)","  # ====================================================================="],"id":154}],[{"start":{"row":61,"column":0},"end":{"row":63,"column":33},"action":"remove","lines":["      # -------------------------","      # Pylint full project linting","      # -------------------------"],"id":155}],[{"start":{"row":67,"column":0},"end":{"row":72,"column":33},"action":"remove","lines":["      # -------------------------","      # Django Unit Tests","      # -------------------------","      # - name: Run Djang