<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>{% block title %}{% endblock %}</title>
  <style>
    :root {
      --primary: #588157;
      --accent: #000000;
      --light: #f8f5f0;
      --text: #2d2d2d;
      --white: #ffffff;
      --border: rgba(200,169,110,0.25);
      --sidebar-w: 240px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background-color: #f1f4f8; color: var(--text); }

    /* TOP NAV */
    .top-navbar {
      background: #588157;
      height: 64px;
      display: flex; align-items: center;
      padding: 0 2rem;
      position: sticky; top: 0; z-index: 999;
      border-bottom: 1px solid var(--border);
      justify-content: space-between;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem; font-weight: 700;
      color: #fff; text-decoration: none; letter-spacing: 0.3px;
    }
    .brand span { color: var(--accent); }
    .top-nav-links { display: flex; align-items: center; gap: 0.25rem; }
    .top-nav-links a {
      color: rgba(255,255,255,0.78);
      font-size: 0.82rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 0.4rem 1rem;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .top-nav-links a:hover { color: var(--accent); background: rgba(255,255,255,0.06); }
    .top-nav-links .user-badge {
      background: var(--accent); color: #fff;
      border-radius: 4px; padding: 0.35rem 1rem;
      font-weight: 600;
    }
    .top-nav-links .signout-link {
      border: 1px solid rgba(200,169,110,0.4);
      color: var(--accent) !important;
    }
    .top-nav-links .signout-link:hover { background: rgba(200,169,110,0.1); }

    /* PAGE WRAPPER */
    .page-wrapper { padding: 2rem; }

    input[type=text], input[type=password], input[type=number], select {
      width: 100%; padding: 12px 14px; margin: 5px 0 14px;
      border: 1px solid #dde1e7; border-radius: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      background: #fff; color: var(--text); transition: border 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--accent); outline: none;
      box-shadow: 0 0 0 3px rgba(200,169,110,0.12);
    }
    hr { border: none; border-top: 1px solid #e5e7eb; margin-bottom: 20px; }
    label { font-size: 0.88rem; font-weight: 600; color: #4b5563; letter-spacing: 0.03em; text-transform: uppercase; }

    {% block css %}{% endblock %}
  </style>
</head>
<body>
  <nav class="top-navbar">
    <a class="brand" href="/home2/">Rent<span>MyRide</span></a>
    <div class="top-nav-links">
      <a href="/all_cars/">All Cars</a>
      <a href="/add_car/">Add Car</a>
      <a href="/all_orders/">Orders</a>
      <a href="/earnings/">Bookings</a>
      <a href="/signout/" class="signout-link">Sign Out</a>
      <a href="/signout/" class="user-badge">{{ request.user }}</a>
    </div>
  </nav>
  <div class="page-wrapper">
    {% block body %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block js %}{% endblock %}
</body>
</html>
