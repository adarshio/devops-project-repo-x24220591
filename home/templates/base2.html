<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>{% block title %}{% endblock title %}</title>
  <style>
    :root {
      --primary: #588157;
      --accent: #000000;
      --light: #f8f5f0;
      --text: #2d2d2d;
      --white: #ffffff;
      --border: rgba(200,169,110,0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background-color: var(--light); color: var(--text); }
    .navbar {
      background: #588157;
      backdrop-filter: blur(12px);
      padding: 0 3rem; height: 70px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 999;
    }
    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; font-weight: 700;
      color: var(--white) !important; letter-spacing: 0.5px;
    }
    .navbar-brand span { color: var(--accent); }
    .nav-link {
      color: rgba(255,255,255,0.82) !important;
      font-size: 0.9rem; font-weight: 500;
      letter-spacing: 0.04em; padding: 0.5rem 1.1rem !important;
      transition: color 0.2s; text-transform: uppercase;
    }
    .nav-link:hover { color: var(--accent) !important; }
    .nav-link.btn-outline-nav {
      border: 1px solid rgba(200,169,110,0.5);
      border-radius: 4px; color: var(--accent) !important;
    }
    .nav-link.btn-outline-nav:hover { background: var(--accent); color: #fff !important; }
    input[type=text], input[type=password] {
      width: 100%; padding: 13px 16px; margin: 6px 0 18px;
      border: 1px solid #dde1e7; border-radius: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      background: #fff; color: var(--text); transition: border 0.2s;
    }
    input[type=text]:focus, input[type=password]:focus {
      border-color: var(--accent); outline: none;
      box-shadow: 0 0 0 3px rgba(200,169,110,0.12);
    }
    hr { border: none; border-top: 1px solid #e5e7eb; margin-bottom: 20px; }
    .container { padding: 16px; }
    {% block css %}{% endblock css %}
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">QuickCar</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto align-items-center gap-1">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/customer_login/">Customer Login</a></li>
          <li class="nav-item"><a class="nav-link" href="/car_dealer_login/">Dealer Login</a></li>
          <li class="nav-item"><a class="nav-link btn-outline-nav ms-2" href="/signout/">Sign Out</a></li>
        </ul>
      </div>
    </div>
  </nav>
  {% block body %}{% endblock body %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block js %}{% endblock js %}
</body>
</html>
